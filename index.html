<!DOCTYPE html>
<html>
    <head>
        <title>For My Love ❤️</title>
        <style>
            body {
                text-align: center;
                font-family: Arial, sans-serif;
                background: linear-gradient(to right, #ff9a9e, #fecfef);
                color: white;
            }

            h1 {
                margin-top: 40px;
            }

            .gallery {
                margin-top: 30px;
            }

            .gallery img {
                width: 250px;
                height: auto;
                margin: 10px;
                border-radius: 15px;
                box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            }

            button {
                margin-top: 30px;
                padding: 15px 30px;
                font-size: 18px;
                border: none;
                border-radius: 25px;
                background-color: white;
                color: #ff4b5c;
                cursor: pointer;
                transition: 0.3s;
            }

            button:hover {
                background-color: #ff4b5c;
                color: white;
            }
        </style>
    </head>
    <body>

        <h1>Happy Valentine's Day My Love 💖</h1>

        <div class="gallery">
            <img src="photo1.jpg">
            <img src="photo2.jpeg">
        </div>

        <br>
        <a href="page2.html">
            <button>Click For Your Surprise 😘</button>
        </a>
    </body>
</html>
